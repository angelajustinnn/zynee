<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zyneé | Verify OTP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/responsive.css" />
  <script src="/js/mobile-fit-all-pages.js"></script>
<style>
    :root {
      --theme-hue: 270;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe9ec, #f7ddff, #d8eaff, #fff0f5);
      background-size: 400% 400%;
      animation: dreamyBG 15s ease infinite;
    }

    @keyframes dreamyBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .otp-card {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 2rem;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(190, 160, 255, 0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .form-control {
      border-radius: 1.2rem;
      border: 1px solid #e3c6f3;
    }

    .btn-verify {
      background-color: #d7a8f0;
      color: white;
      border-radius: 1.5rem;
      font-weight: 500;
    }

    .btn-verify:hover {
      background-color: #c285e6;
    }

    .link-secondary {
      text-decoration: none;
      color: #7c5f99;
    }

    .link-secondary:hover {
      text-decoration: underline;
    }

    .otp-card h4 {
      font-size: 1.75rem;
      font-weight: 500;
      color: #6b5c7d;
    }

    @media (max-width: 767.98px) {
      body {
        min-height: 100svh;
        height: auto;
        padding: 1rem 0.75rem;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .otp-card {
        max-width: 360px;
        width: 100%;
        padding: 1.4rem 1.05rem 1.2rem;
        border-radius: 1.45rem;
        transform: scale(0.84);
        transform-origin: top center;
        margin: 0 auto;
      }

      .otp-card h4 {
        font-size: 1.45rem;
        margin-bottom: 0.65rem !important;
      }

      .otp-card p {
        font-size: 0.9rem;
      }

      .form-control,
      .btn-verify {
        min-height: 44px;
      }
    }
  </style>
</head>
<body>

  <div class="otp-card">
    <h4 class="mb-4">🔐 Email Verification</h4>
    <p class="text-muted mb-3">We’ve sent a 6-digit code to your email.</p>

    <form action="/verify-otp" method="post">
  <input type="text" name="otp" maxlength="6" class="form-control text-center mb-3" placeholder="Enter OTP" required />


  <button type="submit" class="btn btn-verify w-100">Verify</button>
<!-- ✅ Success message -->
<p class="text-success mt-3" th:if="${otpMessage}" th:text="${otpMessage}"></p>

  <!-- 🔴 Error message -->
  <p class="text-danger mt-3" th:if="${otpError}" th:text="${otpError}"></p>
</form>
<div id="countdownContainer" th:if="${otpCooldown != null}">
  <p style="color: red;">
    Please wait <span id="countdown"></span> before trying again.
  </p>
</div>

<p class="text-muted mt-3" style="font-size: 0.9rem;">
  Didn't receive the code? <a href="/resend-otp" class="link-secondary">Resend</a>
</p>
<script th:inline="javascript">
  /*<![CDATA[*/
  let countdownSeconds = /*[[${otpCooldown}]]*/ 0;

  if (countdownSeconds > 0) {
    const countdownEl = document.getElementById("countdown");

    const updateTimer = () => {
      const minutes = Math.floor(countdownSeconds / 60);
      const seconds = countdownSeconds % 60;
      countdownEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      countdownSeconds--;

      if (countdownSeconds >= 0) {
        setTimeout(updateTimer, 1000);
      } else {
        // Optionally hide the message after countdown ends
        document.getElementById("countdownContainer").style.display = "none";
      }
    };

    updateTimer();
  }
  /*]]>*/
</script>

<script>
  (function () {
    function isBackForward() {
      var nav = (performance.getEntriesByType && performance.getEntriesByType("navigation")) || [];
      return nav.length > 0 && nav[0].type === "back_forward";
    }

    window.addEventListener("pageshow", function (event) {
      if (event.persisted || isBackForward()) {
        window.location.replace("/login.html?reauth=true");
      }
    });
  })();
</script>
</body>
</html>
