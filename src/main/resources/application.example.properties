# ---------- Application Info ----------
spring.application.name=zynee

# ---------- MySQL Configuration ----------
spring.datasource.url=jdbc:mysql://localhost:3306/zynee_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA & Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- Mail ----------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ---------- Server Binding ----------
server.address=localhost
server.port=9090
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ---------- Local Python Assistant ----------
assistant.python.url=http://127.0.0.1:8001/chat
assistant.python.insights-url=http://127.0.0.1:8001/insights-analyze
assistant.python.connect-timeout-ms=5000
assistant.python.read-timeout-ms=30000
assistant.python.auto-start=true
assistant.python.health-url=http://127.0.0.1:8001/health
assistant.python.working-dir=assistant-microservice
assistant.python.python-bin=.venv/bin/python3
assistant.python.start-timeout-ms=15000

# ---------- Local Ollama ----------
assistant.ollama.auto-start=true
assistant.ollama.health-url=http://127.0.0.1:11434/api/tags
assistant.ollama.command=ollama
assistant.ollama.start-timeout-ms=10000
