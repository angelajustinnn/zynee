services:
  - type: web
    name: zynee-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /login.html
    envVars:
      - key: SERVER_ADDRESS
        value: 0.0.0.0
      - key: SERVER_PORT
        value: 10000
      - key: ASSISTANT_PYTHON_AUTO_START
        value: "false"
      - key: ASSISTANT_OLLAMA_AUTO_START
        value: "false"
      - key: ASSISTANT_PYTHON_URL
        value: https://zynee-assistant.onrender.com/chat
      - key: ASSISTANT_PYTHON_INSIGHTS_URL
        value: https://zynee-assistant.onrender.com/insights-analyze
      - key: ASSISTANT_PYTHON_MOOD_URL
        value: https://zynee-assistant.onrender.com/mood-forecast
      - key: ASSISTANT_PYTHON_HEALTH_URL
        value: https://zynee-assistant.onrender.com/health

      # Keep these secret values configured in Render Dashboard.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_MAIL_HOST
        sync: false
      - key: SPRING_MAIL_PORT
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED
        sync: false

  - type: web
    name: zynee-assistant
    runtime: python
    plan: free
    region: oregon
    rootDir: assistant-microservice
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: OLLAMA_MODEL
        value: llama3.2

      # Set this in Render Dashboard if you host Ollama externally.
      # Example: https://your-ollama-host.example.com/api/chat
      - key: OLLAMA_URL
        sync: false
